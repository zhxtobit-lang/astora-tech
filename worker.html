<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Astora OS｜登录系统</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0b0f1a;
padding:30px;
border-radius:12px;
border:1px solid #1f2a37;
width:320px;
}

h2{
text-align:center;
color:#60a5fa;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#111827;
color:#fff;
}

button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:6px;
background:#3b82f6;
color:#fff;
cursor:pointer;
}

.small{
font-size:12px;
color:#9ca3af;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Astora OS 登录</h2>

<input id="user" placeholder="用户名">
<input id="pass" type="password" placeholder="密码">

<button onclick="login()">登录</button>

<div class="small">没有账号？直接注册后登录（本地系统）</div>

</div>

<script>

/* 初始化默认账号（第一次自动创建） */
function init(){

let users = JSON.parse(localStorage.getItem("users") || "{}");

if(!users["CEO"]){
users["CEO"] = {pass:"admin123", role:"CEO"};
users["hr"] = {pass:"hr123", role:"HR"};
users["edson"] = {pass:"123", role:"电竞"};

localStorage.setItem("users", JSON.stringify(users));
}
}

init();

/* 登录 */
function login(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

let users = JSON.parse(localStorage.getItem("users") || "{}");

if(!users[u]){
alert("账号不存在");
return;
}

if(users[u].pass !== p){
alert("密码错误");
return;
}

/* 保存登录状态 */
localStorage.setItem("currentUser", u);
localStorage.setItem("currentRole", users[u].role);

/* 🧠 v9.0核心：跳转后台 */
location.href = "dashboard.html";
}

</script>

</body>
</html>
