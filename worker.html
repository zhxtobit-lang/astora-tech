<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Astora OS 登录</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0b0f1a;
padding:30px;
border-radius:12px;
border:1px solid #1f2a37;
width:320px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#111827;
color:#fff;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:#fff;
cursor:pointer;
}

h2{
text-align:center;
color:#60a5fa;
}

.small{
font-size:12px;
color:#9ca3af;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Astora OS Login</h2>

<input id="user" placeholder="用户名">
<input id="pass" type="password" placeholder="密码">

<button onclick="login()">登录</button>
<button onclick="register()">注册</button>

<div class="small">首次使用可注册账号（本地系统）</div>
</div>

<script>

/* =========================
   初始化企业账号
========================= */
function init(){

let users = JSON.parse(localStorage.getItem("users") || "{}");

let defaults = {
"北笙凉风": {password:"123456", role:"CEO"},
"曼波": {password:"123456", role:"Secretary"},
"Edson": {password:"123456", role:"Director"},
"哈基樱": {password:"123456", role:"HR"},
"林靖贤": {password:"123456", role:"Manager"}
};

for(let k in defaults){
if(!users[k]){
users[k] = defaults[k];
}
}

localStorage.setItem("users", JSON.stringify(users));
}

init();

/* =========================
   登录
========================= */
function login(){

let u = document.getElementById("user").value.trim();
let p = document.getElementById("pass").value.trim();

let users = JSON.parse(localStorage.getItem("users") || "{}");

if(!users[u]){
alert("账号不存在");
return;
}

if(users[u].password !== p){
alert("密码错误");
return;
}

localStorage.setItem("currentUser", u);
localStorage.setItem("currentRole", users[u].role);

location.href = "dashboard.html";
}

/* =========================
   注册（你新增的）
========================= */
function register(){

let u = document.getElementById("user").value.trim();
let p = document.getElementById("pass").value.trim();

if(!u || !p){
alert("请输入账号和密码");
return;
}

let users = JSON.parse(localStorage.getItem("users") || "{}");

if(users[u]){
alert("该账号已存在");
return;
}

users[u] = {
password: p,
role: "Worker"
};

localStorage.setItem("users", JSON.stringify(users));

alert("注册成功，可以登录了");
}

</script>

</body>
</html>
